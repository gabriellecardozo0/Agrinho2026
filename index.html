<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AgroFuturo Digital</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <header>
        <h1>AGRO FORTE 2024</h1>
        <p>Sustentabilidade & Tecnologia</p>
    </header>

    <div class="container">
        <section class="card">
            <h2>Simulador de Irrigação de Precisão</h2>
            <p>No futuro, nenhum pingo de água será desperdiçado. Tente manter a planta hidratada sem passar de 100%!</p>
            
            <div id="game-container">
                <div id="plant" style="font-size: 50px; width: 100px; margin: auto;">🌱</div>
                <p id="status">Clique no botão para começar!</p>
                <button onclick="waterPlant()">IRRIGAR AGORA</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script> </body>
